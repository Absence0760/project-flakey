# Better Testing — GitLab CI template
#
# Copy this to your repository root as .gitlab-ci.yml and adjust:
#   - The test command and working directory
#   - SUITE_NAME to match your project
#
# Required CI/CD variables (Settings > CI/CD > Variables):
#   FLAKEY_API_KEY      — Better Testing API key (Profile > API Keys)
#   FLAKEY_API_URL      — Better Testing backend URL (e.g. https://bt.yourcompany.com)
#
# How MR integration works:
#   After flakey-upload completes, the Better Testing backend:
#     1. Looks up an open MR for the current commit SHA or source branch via
#        GET /projects/{id}/repository/commits/{sha}/merge_requests (GitLab API).
#     2. Posts or updates an MR note (POST/PUT /projects/{id}/merge_requests/{iid}/notes)
#        with pass rate, flaky tests, and a link to the run.
#     3. Posts a commit status (POST /projects/{id}/statuses/{sha}) with
#        state=success/failed and a link to the run.
#   Configure the GitLab integration in Better Testing Settings > Integrations > GitLab.
#   Required token scope: api (to post notes and statuses).

stages:
  - test
  - upload

variables:
  SUITE_NAME: "my-project-smoke"
  NODE_VERSION: "20"

# ── Cypress (reporter uploads automatically) ──────────────────────────────────
test:cypress:
  stage: test
  image: cypress/base:${NODE_VERSION}
  variables:
    FLAKEY_API_URL: $FLAKEY_API_URL
    FLAKEY_API_KEY: $FLAKEY_API_KEY
    BRANCH: $CI_COMMIT_REF_NAME
    COMMIT_SHA: $CI_COMMIT_SHA
    CI_RUN_ID: $CI_PIPELINE_ID
  script:
    - cd examples/cypress
    - npm install -g pnpm
    - pnpm install
    - pnpm test:smoke
  artifacts:
    when: always
    paths:
      - examples/cypress/cypress/screenshots/
      - examples/cypress/cypress/videos/
    expire_in: 7 days

