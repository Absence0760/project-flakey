# Shared env for the Authentik server + worker (idp-scim profile). The secret
# key / bootstrap creds here are DEV-ONLY throwaway values for a local,
# opt-in IdP — same class as the flakey/flakey + minioadmin creds elsewhere in
# this file. Never reuse them anywhere real.
x-authentik-env: &authentik-env
  AUTHENTIK_SECRET_KEY: "dev-only-authentik-secret-key-do-not-use-in-prod-0000"
  AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
  AUTHENTIK_POSTGRESQL__USER: authentik
  AUTHENTIK_POSTGRESQL__PASSWORD: authentik
  AUTHENTIK_POSTGRESQL__NAME: authentik
  AUTHENTIK_REDIS__HOST: authentik-redis
  AUTHENTIK_BOOTSTRAP_PASSWORD: akadminpassword
  AUTHENTIK_BOOTSTRAP_TOKEN: flakey-authentik-dev-token
  AUTHENTIK_BOOTSTRAP_EMAIL: akadmin@example.com
  AUTHENTIK_DISABLE_UPDATE_CHECK: "true"
  AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
  AUTHENTIK_AVATARS: "none"

services:
  postgres:
    image: postgres:16-alpine
    container_name: flakey-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: flakey
      POSTGRES_PASSWORD: flakey
      POSTGRES_DB: flakey
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flakey"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Local SMTP sink for transactional mail (email verification, password
  # reset, scheduled reports). The backend defaults to localhost:1025,
  # which is exactly Mailpit's SMTP port — no backend config needed.
  # View captured mail at http://localhost:8025.
  mailpit:
    image: axllent/mailpit:latest
    container_name: flakey-mailpit
    ports:
      - "1025:1025" # SMTP — matches the backend's default SMTP_PORT
      - "8025:8025" # web UI
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  # S3-compatible object store for exercising the STORAGE=s3 code path
  # locally. Opt-in — only starts with `--profile storage` — because the
  # default STORAGE=local (disk) needs nothing. Console: http://localhost:9001
  # (minioadmin / minioadmin).
  minio:
    image: minio/minio:latest
    container_name: flakey-minio
    profiles: ["storage"]
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # S3 API (point S3_ENDPOINT here)
      - "9001:9001" # web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data

  # One-shot: create the artifact bucket the backend writes to, then exit.
  # The `until` loop is the readiness wait — MinIO has no lightweight
  # healthcheck that works without a configured mc alias.
  minio-init:
    image: minio/mc:latest
    container_name: flakey-minio-init
    profiles: ["storage"]
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - >
        until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
        mc mb --ignore-existing local/flakey-artifacts;
        mc anonymous set download local/flakey-artifacts;

  # Local OIDC/SAML identity provider for prototyping + e2e-testing Flakey SSO
  # (Phase 14) with zero online signup. Opt-in via `--profile idp` because
  # stock auth (JWT + API keys + email/password) needs no IdP. The `flakey`
  # realm is seeded deterministically from infra/keycloak/flakey-realm.json on
  # boot (users sso.admin@example.com / sso.viewer@example.com, password
  # `ssopassword`; OIDC client `flakey-web`). Admin console at
  # http://localhost:8081 (admin / admin). Runs on 8081 to dodge the
  # webhook-sink's 8080.
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: flakey-keycloak
    profiles: ["idp"]
    command: ["start-dev", "--import-realm", "--http-port=8081"]
    ports:
      - "8081:8081"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./infra/keycloak/flakey-realm.json:/opt/keycloak/data/import/flakey-realm.json:ro

  # ---- Authentik IdP + SCIM provisioning (idp-scim profile) -----------------
  # Authentik covers OIDC/SAML AND acts as a SCIM *provider* (pushes users/
  # groups to a target) — the half Keycloak can't do out of the box. Used to
  # e2e-test Flakey's future inbound SCIM endpoint (Phase 14) against a real
  # IdP, with the scim-target below standing in until that endpoint exists.
  # Opt-in via `pnpm idp:scim:up`. Heavier than Keycloak (its own pg + redis +
  # server + worker), so it's a separate profile from the lightweight `idp`.
  authentik-postgres:
    image: postgres:16-alpine
    container_name: flakey-authentik-db
    profiles: ["idp-scim"]
    environment:
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: authentik
      POSTGRES_DB: authentik
    volumes:
      - authentik-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentik"]
      interval: 5s
      timeout: 3s
      retries: 10

  authentik-redis:
    image: redis:7-alpine
    container_name: flakey-authentik-redis
    profiles: ["idp-scim"]
    command: --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10

  authentik-server:
    image: ghcr.io/goauthentik/server:2025.10
    container_name: flakey-authentik
    profiles: ["idp-scim"]
    command: server
    environment: *authentik-env
    ports:
      - "9002:9000" # web UI / API — admin akadmin / akadminpassword
    depends_on:
      authentik-postgres:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy

  authentik-worker:
    image: ghcr.io/goauthentik/server:2025.10
    container_name: flakey-authentik-worker
    profiles: ["idp-scim"]
    command: worker
    environment: *authentik-env
    # The worker runs the SCIM sync tasks.
    depends_on:
      authentik-postgres:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy

  # Mock SCIM 2.0 target — stands in for Flakey's future /scim/v2 endpoint so
  # Authentik has somewhere to provision to. Records every push at
  # http://localhost:8082/_captured for the e2e test to assert against. Pure
  # node:http, one mounted file (infra/scim-target/server.mjs) — no build.
  scim-target:
    image: node:22-alpine
    container_name: flakey-scim-target
    profiles: ["idp-scim"]
    command: ["node", "/app/server.mjs"]
    working_dir: /app
    environment:
      PORT: "8082"
      SCIM_TOKEN: flakey-scim-dev-token
    ports:
      - "8082:8082"
    volumes:
      - ./infra/scim-target/server.mjs:/app/server.mjs:ro

  # Echo server for inspecting outbound webhooks / PR-comment posts
  # locally. Opt-in via `--profile integrations`. Point a webhook target
  # at http://localhost:8080 and read payloads with
  # `docker compose logs -f webhook-sink`. (Dev already allows private
  # webhook targets; prod needs WEBHOOK_ALLOW_PRIVATE_TARGETS=true.)
  webhook-sink:
    image: mendhak/http-https-echo:latest
    container_name: flakey-webhook-sink
    profiles: ["integrations"]
    ports:
      - "8080:8080"
    environment:
      HTTP_PORT: 8080

  # Local LLM for the AI-analysis features (failure classification, flaky
  # triage). Serves an OpenAI-compatible API on :11434; the backend points at
  # it via AI_PROVIDER=openai + AI_BASE_URL=http://localhost:11434/v1 (see
  # backend/.env). Opt-in via `--profile ai` (pnpm ai:up) — AI is off by
  # default (local-first). NOTE: Docker Desktop on macOS has no GPU
  # passthrough, so inference here is CPU-only — fine for exercising the
  # features, not fast. For Metal-accelerated speed, run a native `ollama
  # serve` instead and skip this service (the AI_BASE_URL is the same).
  ollama:
    image: ollama/ollama:latest
    container_name: flakey-ollama
    profiles: ["ai"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama

  # One-shot: pull the default model into the ollama server, then exit. First
  # run downloads ~2 GB (llama3.2); cached in the ollama-models volume after.
  # Override the model with OLLAMA_MODEL (keep it in lockstep with AI_MODEL).
  ollama-pull:
    image: ollama/ollama:latest
    container_name: flakey-ollama-pull
    profiles: ["ai"]
    depends_on:
      ollama:
        condition: service_started
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint:
      - /bin/sh
      - -c
      - >
        until ollama list >/dev/null 2>&1; do sleep 1; done;
        ollama pull "${OLLAMA_MODEL:-llama3.2}"
    restart: "no"

volumes:
  pgdata:
  miniodata:
  authentik-pgdata:
  ollama-models:
