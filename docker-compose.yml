services:
  postgres:
    image: postgres:16-alpine
    container_name: flakey-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: flakey
      POSTGRES_PASSWORD: flakey
      POSTGRES_DB: flakey
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flakey"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
