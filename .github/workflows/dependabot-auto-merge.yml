name: Dependabot auto-merge

# Automatically squash-merges minor + patch Dependabot PRs once CI is
# green. Saves review burden — `.github/dependabot.yml` configures 5
# ecosystems (backend npm, frontend npm/pnpm, packages workspace,
# GitHub Actions, Terraform), each opening 1-5 grouped PRs / week, so
# without this most of the human review time goes to bumping a patch
# version of an action or a transitive dep.
#
# Major bumps stay manual. Past audit history shows Svelte 5 and
# pnpm 10 majors needed careful migration; auto-merging those would
# actively break the build.
#
# Repository settings required (both are off by default on a fresh
# org repo, so check after a clone):
#   1. Settings → General → Pull Requests → "Allow auto-merge"
#      Without this, `gh pr merge --auto` errors and the workflow
#      no-ops; PRs sit waiting for a human like before.
#   2. Settings → Actions → General → Workflow permissions →
#      "Allow GitHub Actions to create and approve pull requests"
#      Without this, `gh pr review --approve` fails with "GitHub
#      Actions is not permitted to approve pull requests". We tolerate
#      that failure below so the auto-merge step still runs — handy
#      when branch protection doesn't require an explicit approval
#      (only required checks). If branch protection DOES require
#      approval, the queued auto-merge will sit until a human reviews.

on:
  pull_request_target:
    branches: [main]

# Restrictive top-level default; the auto-merge job re-grants the writes
# it actually needs at the job level. Resolves Scorecard
# TokenPermissionsID 'topLevel contents permission set to write'.
permissions:
  contents: read

jobs:
  auto-merge:
    name: Auto-merge minor + patch
    runs-on: ubuntu-latest
    permissions:
      # `pull_request_target` runs in the base-branch context — needs
      # explicit grants for the few things gh/dependabot do here.
      contents: write
      pull-requests: write
    # Pull-request author check guards against any non-dependabot
    # PR accidentally tripping this. The fetch-metadata action below
    # is hardened against forged commit messages from compromised
    # branches, but a belt-and-braces author gate costs nothing.
    if: github.actor == 'dependabot[bot]'
    timeout-minutes: 5
    steps:
      - name: Read dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          # Fetch metadata signs the result with the workflow's own
          # GITHUB_TOKEN so a malicious PR can't claim to be a patch
          # bump it isn't.
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve PR (tolerant)
        # Best-effort. Fails when the repo hasn't enabled "Allow GitHub
        # Actions to create and approve pull requests" (see header
        # comment) — that's a configuration choice, not a CI bug, so we
        # don't fail the workflow over it. The auto-merge step below
        # still runs and will land the PR if branch protection allows
        # it without an explicit approval.
        if: steps.meta.outputs.update-type == 'version-update:semver-minor' || steps.meta.outputs.update-type == 'version-update:semver-patch'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr review --approve "$PR_URL"

      - name: Queue auto-merge (minor + patch)
        # `--auto --squash` lands the merge as soon as every required
        # check turns green. If branch protection blocks the merge,
        # `--auto` queues it — the user can land it manually after
        # the protection is satisfied.
        if: steps.meta.outputs.update-type == 'version-update:semver-minor' || steps.meta.outputs.update-type == 'version-update:semver-patch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"
