name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      contains(vars.CLAUDE_ALLOWED_USERS, github.actor) && (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.assignees.*.login, 'claude')))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          base_branch: main
          claude_args: "--max-turns 40 --allowedTools 'Bash(pnpm *),Bash(git *),Bash(gh *),Read,Write,Edit,Glob,Grep'"

      # Comment `@claude` on the PR (not the issue) for follow-ups —
      # the action only reuses an existing branch for PR-scoped mentions.
      # Issue-scoped mentions always create a new timestamped branch.
      - name: Open draft PR for issue
        if: |
          steps.claude.outputs.branch_name != '' && (
            github.event_name == 'issues' ||
            (github.event_name == 'issue_comment' && !github.event.issue.pull_request)
          )
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.claude.outputs.branch_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          if gh pr view "$BRANCH" --json number >/dev/null 2>&1; then
            echo "PR already exists for $BRANCH — skipping."
            exit 0
          fi
          gh pr create \
            --draft \
            --base main \
            --head "$BRANCH" \
            --title "$ISSUE_TITLE" \
            --body "Closes #${ISSUE_NUMBER}"
