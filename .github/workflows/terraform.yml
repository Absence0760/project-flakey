name: Terraform

# Guards the Terraform stacks under `infra/` against three classes
# of regression:
#   1. `terraform fmt` drift — keeps the formatter idempotent so the
#      PR diff is the real change, not whitespace churn.
#   2. `terraform validate` — syntax + provider-version + ref-shape
#      checks. Doesn't touch state (we pass `-backend=false`), so the
#      check can run without AWS credentials.
#   3. Trivy IaC mode — known-bad patterns (public S3 buckets, IAM
#      `Action: *`, security-group 0.0.0.0/0 ingress, etc.). Cheaper
#      to surface in CI than discover after `terraform apply`. Trivy
#      is reused from the security workflow so we don't introduce a
#      second IaC scanner; the same SARIF flows to the Security tab.
#
# Runs on every PR that touches `infra/` and on every push to main.
# Doesn't run on docs-only edits — the path filter below scopes it.
#
# Stacks scanned (matrix expanded inline):
#   - infra            (root module: ECS Fargate + RDS + S3/CloudFront)
#   - infra/bootstrap  (state bucket + DDB lock + GitHub-OIDC role — one-time)
#
# `infra/modules/*` is deliberately NOT in the matrix: `terraform
# validate` against a module typically needs the caller's provider
# wiring. The modules are transitively validated by the root `infra`
# stack that consumes them.

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/terraform.yml'

permissions:
  contents: read

jobs:
  fmt-validate:
    name: fmt + validate (${{ matrix.stack }})
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        stack:
          - infra
          - infra/bootstrap

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          # Matches the `>= 1.5` floor pinned in each stack's `versions.tf`
          # / inline `terraform` block. Bump in lockstep when the floor moves.
          terraform_version: '1.13.0'
          terraform_wrapper: false

      - name: terraform fmt -check
        working-directory: ${{ matrix.stack }}
        run: terraform fmt -check -diff

      - name: terraform init (backend=false)
        working-directory: ${{ matrix.stack }}
        # `-backend=false` skips the S3 state lookup — `validate`
        # doesn't need it, and we don't want to give CI write access
        # to the prod state bucket just to run a syntax check.
        run: terraform init -backend=false -input=false

      - name: terraform validate
        working-directory: ${{ matrix.stack }}
        run: terraform validate -no-color

  trivy-iac:
    name: Trivy IaC scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          # `scan-type: config` runs the IaC ruleset across HCL / yaml
          # / json (so it picks up the workflows too, harmlessly).
          # Trivy bundles tfsec-derived checks so we get the same
          # coverage without standing up tfsec separately.
          scan-type: config
          scan-ref: infra
          format: sarif
          output: trivy-iac.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload Trivy IaC SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always()
        with:
          sarif_file: trivy-iac.sarif
          category: trivy-iac
