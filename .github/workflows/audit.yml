name: Dependency audit

# Weekly scheduled audit + manual trigger. Runs `pnpm audit` against all
# workspaces and opens an issue if any vulnerabilities at moderate or
# higher severity are found. Closes the issue automatically when the next
# clean run completes.
on:
  schedule:
    # 06:00 UTC every Monday — early enough to land in the inbox before
    # any work starts, late enough that the cron isn't competing with
    # peak workflow scheduler load.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        id: audit
        run: |
          set +e
          # --audit-level=moderate ignores low/info findings (typically
          # noise from dev-only deps with no real exposure). The exit
          # code is non-zero when issues are found at >= the level.
          pnpm audit --audit-level=moderate --json > audit.json
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          if [ -s audit.json ]; then
            echo "## pnpm audit findings (moderate or higher)" > audit-summary.md
            echo "" >> audit-summary.md
            echo '```json' >> audit-summary.md
            head -c 60000 audit.json >> audit-summary.md
            echo '' >> audit-summary.md
            echo '```' >> audit-summary.md
          else
            echo "No findings." > audit-summary.md
          fi
          cat audit-summary.md

      - name: Open or update tracking issue on findings
        if: steps.audit.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Ensure the label exists. Idempotent — silently no-ops if already
          # there. Lets the workflow run cleanly on a fresh repo.
          gh label create dependency-audit --repo "$REPO" \
            --color FBCA04 \
            --description "Findings from the scheduled pnpm audit workflow" \
            2>/dev/null || true

          # Look for an existing open issue tagged "dependency-audit". If
          # one exists, update its body; otherwise create a new one.
          existing=$(gh issue list --repo "$REPO" --state open \
            --label dependency-audit --json number --jq '.[0].number // empty')

          body_file=audit-summary.md
          if [ -n "$existing" ]; then
            gh issue edit "$existing" --repo "$REPO" --body-file "$body_file"
            gh issue comment "$existing" --repo "$REPO" \
              --body "Re-detected on $(date -u +%Y-%m-%d). See workflow run $GITHUB_RUN_ID."
          else
            gh issue create --repo "$REPO" \
              --title "pnpm audit: vulnerabilities detected" \
              --body-file "$body_file" \
              --label dependency-audit
          fi

      - name: Close tracking issue on clean run
        if: steps.audit.outputs.exit_code == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          existing=$(gh issue list --repo "$REPO" --state open \
            --label dependency-audit --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue close "$existing" --repo "$REPO" \
              --comment "Audit clean as of $(date -u +%Y-%m-%d) — closing automatically."
          fi
