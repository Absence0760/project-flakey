name: OpenSSF Scorecard

# Weekly scorecard analysis — measures branch-protection rules,
# action-pinning discipline, signed releases, code-review coverage,
# vulnerability-management posture, etc. Result publishes to the
# Security tab as SARIF.
#
# We do NOT publish to the public scorecard.dev tracker: nothing
# consumes that result (there's no Scorecard badge in the README),
# and the publish call to api.scorecard.dev intermittently times out
# (`context deadline exceeded`), which fails the whole job for a
# result we never read. Keeping it off also lets us drop the
# `id-token: write` permission that only the publish step needed.
#
# Why this instead of a hand-written checklist: the rubric is
# maintained by the OpenSSF foundation and updates as supply-chain
# threats evolve. Trying to roll the same coverage by hand drifts
# the moment a new attack pattern (e.g. action-cache-poisoning) lands.
#
# Cost: one ubuntu-latest job per week. Findings are advisory — no
# CI gate. The reason a Scorecard run drops is almost always
# actionable (branch protection drifted, an action stopped being
# pinned, the README's security policy disappeared); treat the
# weekly notification as a 30-second triage, not a blocker.

on:
  branch_protection_rule:
  schedule:
    # Mondays at 06:00 UTC — same cadence as the other security
    # sweeps so the security tab has a single weekly tide.
    - cron: '0 6 * * 1'
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      # The bare minimum to upload SARIF to the Security tab. No
      # `id-token: write` — that was only needed by publish_results,
      # which we no longer use (see header comment).
      security-events: write
      contents: read
      actions: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Do not publish to the public scorecard.dev tracker — nothing
          # consumes it and the publish call intermittently fails the job.
          publish_results: false

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          sarif_file: results.sarif
          category: scorecard
