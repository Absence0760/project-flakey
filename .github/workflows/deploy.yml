name: Build & Deploy

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-2
  # Resource names default to the app_name=flakey naming; override via
  # repo-level Actions `vars` (Settings > Secrets and variables > Actions >
  # Variables) when you deploy with a non-default `app_name`. See
  # infra/README.md "Set up GitHub secrets".
  ECR_BACKEND: ${{ vars.ECR_BACKEND || 'flakey-backend' }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER || 'flakey-production' }}
  ECS_SERVICE_BACKEND: ${{ vars.ECS_SERVICE_BACKEND || 'flakey-production-backend' }}

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  check-tag:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - id: check
        env:
          TAG: ${{ github.event.release.tag_name }}
          MANUAL: ${{ github.event_name }}
        run: |
          if [[ "$TAG" == app@* ]] || [[ "$MANUAL" == "workflow_dispatch" ]]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          fi

  deploy-backend:
    needs: [check-tag]
    if: needs.check-tag.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2

      - name: Set up Docker Buildx (cross-arch builder)
        # buildx is the standard path to producing ARM64 images on an
        # x86_64 runner. node:24-alpine ships both architectures, so
        # the cross-compile is a no-op in the base layer; only the
        # node_modules install layer has to run under QEMU.
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Set up QEMU for cross-arch emulation
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        with:
          platforms: arm64

      - name: Build and push SHA-tagged image (linux/arm64)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          # IMMUTABLE repo: push only the per-SHA tag, never `:latest`.
          # The task-definition revision below pins the service to this
          # exact digest, so there's no need for a floating tag.
          # --platform linux/arm64 matches the Fargate task definition's
          # runtime_platform.cpu_architecture = ARM64 (Graviton). If
          # the Terraform flips back to X86_64, change this to
          # linux/amd64 in lockstep.
          docker buildx build \
            --platform linux/arm64 \
            --tag $REGISTRY/$ECR_BACKEND:${{ github.sha }} \
            --push \
            ./backend

      - name: Deploy to ECS (new task-definition revision with SHA image)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TASK_FAMILY: ${{ vars.TASK_FAMILY || 'flakey-production-backend' }}
        run: |
          # Fetch the current task definition, swap the backend image URI
          # to the SHA-tagged digest, register the result as a new
          # revision, then point the service at it. ECS does the rolling
          # restart; --wait below blocks the workflow until it's stable.
          set -euo pipefail
          NEW_IMAGE="$REGISTRY/$ECR_BACKEND:${{ github.sha }}"
          aws ecs describe-task-definition \
            --task-definition "$TASK_FAMILY" \
            --region "$AWS_REGION" \
            --query 'taskDefinition' \
          | jq --arg img "$NEW_IMAGE" '
              .containerDefinitions[0].image = $img
              | del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                    .compatibilities, .registeredAt, .registeredBy)
            ' > /tmp/td.json
          NEW_TD=$(aws ecs register-task-definition \
            --region "$AWS_REGION" \
            --cli-input-json file:///tmp/td.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE_BACKEND" \
            --task-definition "$NEW_TD" \
            --region "$AWS_REGION"

      - name: Wait for deployment
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE_BACKEND \
            --region $AWS_REGION

  deploy-frontend:
    needs: [check-tag, deploy-backend]
    if: needs.check-tag.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10

      - name: Install and build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.API_URL }}
          # Optional public origin (e.g. https://flakey.io) used to make the
          # landing page's canonical + Open Graph / Twitter card URLs absolute.
          # Unset → empty → relative fallback (fine for self-hosted builds).
          VITE_SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync frontend/build s3://${{ secrets.FRONTEND_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.json"

          aws s3 sync frontend/build s3://${{ secrets.FRONTEND_BUCKET }} \
            --cache-control "public, max-age=0, must-revalidate" \
            --exclude "*" \
            --include "*.html" \
            --include "*.json"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
