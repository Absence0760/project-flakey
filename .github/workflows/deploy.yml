name: Build & Deploy

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-2
  ECR_BACKEND: flakey-backend
  ECS_CLUSTER: flakey-production
  ECS_SERVICE_BACKEND: flakey-production-backend

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  check-tag:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - id: check
        env:
          TAG: ${{ github.event.release.tag_name }}
          MANUAL: ${{ github.event_name }}
        run: |
          if [[ "$TAG" == app@* ]] || [[ "$MANUAL" == "workflow_dispatch" ]]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          fi

  deploy-backend:
    needs: [check-tag]
    if: needs.check-tag.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@796449b3e38e3c256861227399e58b780e0e5538 # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2

      - name: Build and push SHA-tagged image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          # IMMUTABLE repo: push only the per-SHA tag, never `:latest`.
          # The task-definition revision below pins the service to this
          # exact digest, so there's no need for a floating tag.
          docker build -t $REGISTRY/$ECR_BACKEND:${{ github.sha }} ./backend
          docker push $REGISTRY/$ECR_BACKEND:${{ github.sha }}

      - name: Deploy to ECS (new task-definition revision with SHA image)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TASK_FAMILY: flakey-production-backend
        run: |
          # Fetch the current task definition, swap the backend image URI
          # to the SHA-tagged digest, register the result as a new
          # revision, then point the service at it. ECS does the rolling
          # restart; --wait below blocks the workflow until it's stable.
          set -euo pipefail
          NEW_IMAGE="$REGISTRY/$ECR_BACKEND:${{ github.sha }}"
          aws ecs describe-task-definition \
            --task-definition "$TASK_FAMILY" \
            --region "$AWS_REGION" \
            --query 'taskDefinition' \
          | jq --arg img "$NEW_IMAGE" '
              .containerDefinitions[0].image = $img
              | del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                    .compatibilities, .registeredAt, .registeredBy)
            ' > /tmp/td.json
          NEW_TD=$(aws ecs register-task-definition \
            --region "$AWS_REGION" \
            --cli-input-json file:///tmp/td.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE_BACKEND" \
            --task-definition "$NEW_TD" \
            --region "$AWS_REGION"

      - name: Wait for deployment
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE_BACKEND \
            --region $AWS_REGION

  deploy-frontend:
    needs: [check-tag, deploy-backend]
    if: needs.check-tag.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@6854221e62e0759fe8deffc48ccb9c91daf8f9b0 # v6
        with:
          version: 10

      - name: Install and build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.API_URL }}
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@796449b3e38e3c256861227399e58b780e0e5538 # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync frontend/build s3://${{ secrets.FRONTEND_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.json"

          aws s3 sync frontend/build s3://${{ secrets.FRONTEND_BUCKET }} \
            --cache-control "public, max-age=0, must-revalidate" \
            --exclude "*" \
            --include "*.html" \
            --include "*.json"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
