name: Tests

# Runs the full test surface on every PR + every push to main, plus
# on manual workflow_dispatch. Four jobs, three of them independent
# (parallel) and one (Playwright e2e) gated on the backend suite so
# we don't burn e2e spend on a PR that already failed at the backend
# unit/smoke layer. The e2e job itself is a 4-shard matrix — each
# shard runs Playwright's `--shard=N/4` slice against its own
# Postgres + backend, so spec-execution wall time is parallelized
# across runners on top of the per-shard `workers: 4` already in
# playwright.config.ts.
#
# Service containers: Postgres 16-alpine matching docker-compose.yml,
# seeded with the same admin@example.com / demo@example.com /
# viewer@example.com triple the local dev tooling expects (so the
# Playwright fixtures/users.ts file stays a single source of truth).

on:
  pull_request:
    branches: [main]
    # Skip the full test surface on docs-only PRs — saves ~4 runner
    # minutes per shard. If `Tests` is ever added as a required status
    # check on `main`, the trigger-level paths-ignore would also skip
    # the check entirely (GitHub may treat that as "Expected" and
    # block the merge); move the filter to a gating job at that point.
    # `push: main` stays unfiltered so the post-merge run still
    # validates main even if the PR itself was skipped.
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".claude/**"
      - "LICENSE"
  push:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs for the same ref when a new push lands. Final
# verdict on each commit is what matters; older runs are throwaway.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests (node --test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        # These Postgres credentials are intentionally fixed, CI-only values
        # for an ephemeral service container that holds no sensitive data and
        # is torn down at job end (PGDATA is tmpfs — see options below). They
        # are NOT production credentials and are never cross-used with any
        # production environment: prod secrets live in AWS, and the CI
        # superuser `flakey`/`flakey` here doesn't even match the application
        # runtime user (`flakey_app`/`flakey_app`) the tests connect as. Safe
        # to keep inline — there is nothing to rotate or leak.
        env:
          POSTGRES_USER: flakey
          POSTGRES_PASSWORD: flakey
          POSTGRES_DB: flakey
        ports: ["5432:5432"]
        # Mount PGDATA on tmpfs so seed + test I/O never touches the
        # runner's disk. Container is torn down at job end; durability
        # is irrelevant here. `--tmpfs` with no size= uses the default
        # (half of host RAM) which is plenty for a short-lived CI DB.
        options: >-
          --health-cmd "pg_isready -U flakey"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --tmpfs /var/lib/postgresql/data
      # SMTP sink for the email-delivery smoke tests (email.smoke.test.ts),
      # mirroring the Mailpit service in docker-compose.yml. SMTP on 1025
      # (the backend's default SMTP_PORT), web/API on 8025 (default
      # MAILPIT_URL). No health gate — the test polls Mailpit until it's up.
      mailpit:
        image: axllent/mailpit:latest
        ports:
          - "1025:1025"
          - "8025:8025"
        env:
          MP_SMTP_AUTH_ACCEPT_ANY: 1
          MP_SMTP_AUTH_ALLOW_INSECURE: 1
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Apply migrations
        # migrate.sh defaults to flakey:flakey on localhost:5432 — matches
        # the service container above without extra env wiring.
        run: ./migrate.sh
      - name: Seed sample data
        # The seed creates the flakey_app non-superuser the tests run as.
        # `node --test` spawns backend instances inside each smoke file
        # with DB_USER=flakey_app, which exists once the seed has finished.
        run: npm run seed
      - name: Run tests
        run: npm test

  packages:
    name: Package tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@6854221e62e0759fe8deffc48ccb9c91daf8f9b0 # v6
        with:
          version: 9
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build @flakeytesting/* packages
        # Reporter packages (cypress-/playwright-/webdriverio-reporter, etc.)
        # import the workspace @flakeytesting/core at runtime; that resolves
        # to core/dist/index.js. Without an explicit build step, the dist/
        # dir doesn't exist and the test run crashes with ERR_MODULE_NOT_FOUND.
        # `-r` walks the workspace in topological order so core builds first.
        run: pnpm -r --filter "@flakeytesting/*" build
      - name: Run @flakeytesting/* tests
        # `pnpm test:packages` is the root-level fan-out across every
        # @flakeytesting/* workspace that defines a test script —
        # currently every package under packages/.
        run: pnpm test:packages

  frontend-check:
    name: Frontend type-check (svelte-check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@6854221e62e0759fe8deffc48ccb9c91daf8f9b0 # v6
        with:
          version: 9
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      # frontend isn't a workspace member (root pnpm-workspace.yaml
      # only globs packages/*), so pnpm would walk up and install the
      # workspace instead — leaving frontend/node_modules empty.
      # --ignore-workspace pins the install to this directory.
      - run: pnpm install --frozen-lockfile --ignore-workspace
      - run: pnpm check

  e2e:
    name: Frontend e2e (Playwright) — shard ${{ matrix.shard }}/4
    runs-on: ubuntu-latest
    # Gate e2e on the backend suite passing so we don't burn Playwright
    # spend on a PR that's already broken below.
    needs: [backend]
    strategy:
      # Don't cancel sibling shards on the first failure — surfacing
      # every failing shard's report makes triage cheaper than
      # re-running CI to see what else broke.
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    services:
      postgres:
        image: postgres:16-alpine
        # Same intentionally-fixed, CI-only Postgres credentials as the
        # backend job above: an ephemeral container with no sensitive data,
        # torn down at job end (PGDATA on tmpfs). NOT production credentials
        # and never cross-used with prod — nothing here to rotate or leak.
        env:
          POSTGRES_USER: flakey
          POSTGRES_PASSWORD: flakey
          POSTGRES_DB: flakey
        ports: ["5432:5432"]
        # Mount PGDATA on tmpfs so seed + test I/O never touches the
        # runner's disk. Container is torn down at job end; durability
        # is irrelevant here. `--tmpfs` with no size= uses the default
        # (half of host RAM) which is plenty for a short-lived CI DB.
        options: >-
          --health-cmd "pg_isready -U flakey"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --tmpfs /var/lib/postgresql/data
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@6854221e62e0759fe8deffc48ccb9c91daf8f9b0 # v6
        with:
          version: 9
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      # `setup-node` only manages one package-manager cache per call.
      # We chose pnpm above (frontend is the heavier install) — cache
      # ~/.npm separately so the backend `npm ci` below hits warm too.
      - name: Cache npm (backend)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      # Backend deps + DB state. Playwright's globalSetup signs each
      # seeded user in via the real /auth/login route, so the seed must
      # have completed before the spec phase begins.
      - name: Install backend deps (npm)
        working-directory: backend
        run: npm ci
      - name: Apply migrations
        working-directory: backend
        run: ./migrate.sh
      - name: Seed sample data
        working-directory: backend
        run: npm run seed

      # Frontend deps. `--ignore-workspace` pins pnpm to frontend/'s
      # own lockfile — frontend is NOT a workspace member and has no
      # @flakeytesting/* dependencies, so we deliberately skip the
      # workspace-root install (which would pull every packages/* into
      # node_modules for nothing).
      - name: Install frontend deps (pnpm)
        working-directory: frontend
        run: pnpm install --frozen-lockfile --ignore-workspace

      # Playwright browsers. Cached by version so repeated runs don't
      # re-download Chromium.
      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: playwright-${{ runner.os }}-
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      # Start the backend in the background. The Playwright config's
      # webServer block auto-starts vite on 7778, so we don't need to
      # spawn the frontend ourselves.
      - name: Start backend
        working-directory: backend
        env:
          PORT: "3000"
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USER: flakey_app
          # Intentionally-fixed, CI-only credential for the application
          # runtime user the seed creates in the ephemeral Postgres above.
          # NOT a production credential and never cross-used with prod —
          # nothing here to rotate or leak.
          DB_PASSWORD: flakey_app
          DB_NAME: flakey
          ALLOW_REGISTRATION: "true"
          NODE_ENV: test
          CORS_ORIGINS: http://localhost:7778
        # Generate the JWT signing key in-job. Repo secrets aren't
        # available on forked PRs, and a static fallback would let a
        # forked-PR author predict the CI backend's signing key. A
        # fresh `openssl rand` each run keeps the CI backend
        # unforgeable without depending on a repo secret existing.
        run: |
          export JWT_SECRET="$(openssl rand -hex 32)"
          npx tsx src/index.ts > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/health >/dev/null 2>&1; then
              echo "backend healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "backend did not become healthy"
          cat /tmp/backend.log
          exit 1

      - name: Run Playwright (shard ${{ matrix.shard }}/4)
        working-directory: frontend
        env:
          # webServer baseURL is 7778; CI flag tightens retries/reporters.
          CI: "true"
        run: pnpm exec playwright test --config=tests-e2e/playwright.config.ts --shard=${{ matrix.shard }}/4

      - name: Backend log on failure
        if: failure()
        run: cat /tmp/backend.log || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          # Suffix with shard — 4 parallel matrix jobs would otherwise
          # collide on the upload-artifact name.
          name: playwright-report-shard-${{ matrix.shard }}
          path: frontend/playwright-report/
          retention-days: 14
