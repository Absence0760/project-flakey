name: Publish Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        required: true
        type: choice
        options:
          - core
          - cli
          - cypress-reporter
          - cypress-snapshots
          - playwright-reporter
          - playwright-snapshots
          - webdriverio-reporter
          - live-reporter
          - mcp-server
          - pytest-reporter
          - all

permissions:
  contents: read

jobs:
  detect-package:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.check.outputs.core }}
      cli: ${{ steps.check.outputs.cli }}
      cypress_reporter: ${{ steps.check.outputs.cypress_reporter }}
      cypress_snapshots: ${{ steps.check.outputs.cypress_snapshots }}
      playwright_reporter: ${{ steps.check.outputs.playwright_reporter }}
      playwright_snapshots: ${{ steps.check.outputs.playwright_snapshots }}
      webdriverio_reporter: ${{ steps.check.outputs.webdriverio_reporter }}
      live_reporter: ${{ steps.check.outputs.live_reporter }}
      mcp_server: ${{ steps.check.outputs.mcp_server }}
      pytest_reporter: ${{ steps.check.outputs.pytest_reporter }}
    steps:
      - id: check
        env:
          TAG: ${{ github.event.release.tag_name }}
          MANUAL: ${{ github.event.inputs.package }}
        run: |
          ALL="false"
          if [[ "$TAG" == all@* ]] || [[ "$MANUAL" == "all" ]]; then
            ALL="true"
          fi

          if [[ "$TAG" == core@* ]] || [[ "$MANUAL" == "core" ]] || [[ "$ALL" == "true" ]]; then
            echo "core=true" >> "$GITHUB_OUTPUT"
          fi
          if [[ "$TAG" == cli@* ]] || [[ "$MANUAL" == "cli" ]] || [[ "$ALL" == "true" ]]; then
            echo "cli=true" >> "$GITHUB_OUTPUT"
          fi
          if [[ "$TAG" == cypress-reporter@* ]] || [[ "$MANUAL" == "cypress-reporter" ]] || [[ "$ALL" == "true" ]]; then
            echo "cypress_reporter=true" >> "$GITHUB_OUTPUT"
          fi
          if [[ "$TAG" == cypress-snapshots@* ]] || [[ "$MANUAL" == "cypress-snapshots" ]] || [[ "$ALL" == "true" ]]; then
            echo "cypress_snapshots=true" >> "$GITHUB_OUTPUT"
          fi
          if [[ "$TAG" == playwright-reporter@* ]] || [[ "$MANUAL" == "playwright-reporter" ]] || [[ "$ALL" == "true" ]]; then
            echo "playwright_reporter=true" >> "$GITHUB_OUTPUT"
          fi
          if [[ "$TAG" == playwright-snapshots@* ]] || [[ "$MANUAL" == "playwright-snapshots" ]] || [[ "$ALL" == "true" ]]; then
            echo "playwright_snapshots=true" >> "$GITHUB_OUTPUT"
          fi
          if [[ "$TAG" == webdriverio-reporter@* ]] || [[ "$MANUAL" == "webdriverio-reporter" ]] || [[ "$ALL" == "true" ]]; then
            echo "webdriverio_reporter=true" >> "$GITHUB_OUTPUT"
          fi
          if [[ "$TAG" == live-reporter@* ]] || [[ "$MANUAL" == "live-reporter" ]] || [[ "$ALL" == "true" ]]; then
            echo "live_reporter=true" >> "$GITHUB_OUTPUT"
          fi
          if [[ "$TAG" == mcp-server@* ]] || [[ "$MANUAL" == "mcp-server" ]] || [[ "$ALL" == "true" ]]; then
            echo "mcp_server=true" >> "$GITHUB_OUTPUT"
          fi
          # pytest-reporter is on its own version line (PyPI, not npm) and is
          # deliberately NOT part of `all` — release it with a pytest-reporter@<version> tag.
          if [[ "$TAG" == pytest-reporter@* ]] || [[ "$MANUAL" == "pytest-reporter" ]]; then
            echo "pytest_reporter=true" >> "$GITHUB_OUTPUT"
          fi

  publish-core:
    needs: [detect-package]
    if: needs.detect-package.outputs.core == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with: { version: 10 }
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with: { node-version: 24, registry-url: "https://registry.npmjs.org" }
      - run: pnpm install
      - run: pnpm build
        working-directory: packages/flakey-core
      - run: pnpm publish --access public --no-git-checks
        working-directory: packages/flakey-core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-cli:
    needs: [detect-package]
    if: needs.detect-package.outputs.cli == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with: { version: 10 }
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with: { node-version: 24, registry-url: "https://registry.npmjs.org" }
      - run: pnpm install
      - run: pnpm build
        working-directory: packages/flakey-cli
      - run: pnpm publish --access public --no-git-checks
        working-directory: packages/flakey-cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-cypress-reporter:
    needs: [detect-package, publish-core]
    if: >
      needs.detect-package.outputs.cypress_reporter == 'true' &&
      (needs.publish-core.result == 'success' || needs.publish-core.result == 'skipped')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with: { version: 10 }
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with: { node-version: 24, registry-url: "https://registry.npmjs.org" }
      - run: pnpm install
      - run: pnpm build
        working-directory: packages/flakey-core
      - run: pnpm build
        working-directory: packages/flakey-cypress-reporter
      - run: pnpm publish --access public --no-git-checks
        working-directory: packages/flakey-cypress-reporter
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-cypress-snapshots:
    needs: [detect-package]
    if: needs.detect-package.outputs.cypress_snapshots == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with: { version: 10 }
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with: { node-version: 24, registry-url: "https://registry.npmjs.org" }
      - run: pnpm install
      - run: pnpm build
        working-directory: packages/flakey-cypress-snapshots
      - run: pnpm publish --access public --no-git-checks
        working-directory: packages/flakey-cypress-snapshots
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-playwright-reporter:
    needs: [detect-package, publish-core]
    if: >
      needs.detect-package.outputs.playwright_reporter == 'true' &&
      (needs.publish-core.result == 'success' || needs.publish-core.result == 'skipped')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with: { version: 10 }
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with: { node-version: 24, registry-url: "https://registry.npmjs.org" }
      - run: pnpm install
      - run: pnpm build
        working-directory: packages/flakey-core
      - run: pnpm build
        working-directory: packages/flakey-playwright-snapshots
      - run: pnpm build
        working-directory: packages/flakey-playwright-reporter
      - run: pnpm publish --access public --no-git-checks
        working-directory: packages/flakey-playwright-reporter
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-playwright-snapshots:
    needs: [detect-package]
    if: needs.detect-package.outputs.playwright_snapshots == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with: { version: 10 }
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with: { node-version: 24, registry-url: "https://registry.npmjs.org" }
      - run: pnpm install
      - run: pnpm build
        working-directory: packages/flakey-playwright-snapshots
      - run: pnpm publish --access public --no-git-checks
        working-directory: packages/flakey-playwright-snapshots
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-webdriverio-reporter:
    needs: [detect-package, publish-core]
    if: >
      needs.detect-package.outputs.webdriverio_reporter == 'true' &&
      (needs.publish-core.result == 'success' || needs.publish-core.result == 'skipped')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with: { version: 10 }
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with: { node-version: 24, registry-url: "https://registry.npmjs.org" }
      - run: pnpm install
      - run: pnpm build
        working-directory: packages/flakey-core
      - run: pnpm build
        working-directory: packages/flakey-webdriverio-reporter
      - run: pnpm publish --access public --no-git-checks
        working-directory: packages/flakey-webdriverio-reporter
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-live-reporter:
    needs: [detect-package]
    if: needs.detect-package.outputs.live_reporter == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with: { version: 10 }
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with: { node-version: 24, registry-url: "https://registry.npmjs.org" }
      - run: pnpm install
      - run: pnpm build
        working-directory: packages/flakey-live-reporter
      - run: pnpm publish --access public --no-git-checks
        working-directory: packages/flakey-live-reporter
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-mcp-server:
    needs: [detect-package]
    if: needs.detect-package.outputs.mcp_server == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with: { version: 10 }
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with: { node-version: 24, registry-url: "https://registry.npmjs.org" }
      - run: pnpm install
      - run: pnpm build
        working-directory: packages/flakey-mcp-server
      - run: pnpm publish --access public --no-git-checks
        working-directory: packages/flakey-mcp-server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Python package — publishes to PyPI via Trusted Publishing (OIDC), so there
  # is no long-lived token secret to manage. One-time PyPI setup is required:
  # add a "pending publisher" for project `flakey-pytest-reporter` pointing at
  # repo Absence0760/project-flakey, workflow `publish.yml`, environment
  # `production` (the same environment the npm jobs use). See
  # https://docs.pypi.org/trusted-publishers/adding-a-publisher/
  publish-pytest-reporter:
    needs: [detect-package]
    if: needs.detect-package.outputs.pytest_reporter == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write # required for PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uv build
        working-directory: packages/flakey-pytest-reporter
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          packages-dir: packages/flakey-pytest-reporter/dist
