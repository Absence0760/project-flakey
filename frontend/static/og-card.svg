<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b3a"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="6" fill="url(#brand)"/>

  <!-- Brand logo tile (the Flakey check) -->
  <g transform="translate(96,86)">
    <rect x="0" y="0" width="96" height="96" rx="22" ry="22" fill="url(#brand)"/>
    <rect x="22" y="26" width="52" height="60" rx="6" ry="6" fill="white" opacity="0.96"/>
    <rect x="35" y="20" width="26" height="13" rx="4" ry="4" fill="white" opacity="0.96"/>
    <polyline points="34,54 45,65 64,44" fill="none" stroke="url(#brand)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="212" y="152" font-family="Helvetica, Arial, sans-serif" font-size="58" font-weight="700" fill="#ffffff">Flakey</text>

  <!-- Headline -->
  <text x="96" y="290" font-family="Helvetica, Arial, sans-serif" font-size="72" font-weight="700" fill="#ffffff">Self-hosted test reporting,</text>
  <text x="96" y="372" font-family="Helvetica, Arial, sans-serif" font-size="72" font-weight="700" fill="#ffffff">CI-agnostic.</text>

  <!-- Subtitle -->
  <text x="96" y="438" font-family="Helvetica, Arial, sans-serif" font-size="30" fill="#a5b4fc">Flaky detection · live streaming · release readiness · MIT-licensed</text>

  <!-- Framework pills -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#cbd5e1">
    <rect x="96"  y="496" width="170" height="50" rx="25" fill="#ffffff" opacity="0.06"/>
    <text x="181" y="528" text-anchor="middle">Cypress</text>
    <rect x="282" y="496" width="200" height="50" rx="25" fill="#ffffff" opacity="0.06"/>
    <text x="382" y="528" text-anchor="middle">Playwright</text>
    <rect x="498" y="496" width="220" height="50" rx="25" fill="#ffffff" opacity="0.06"/>
    <text x="608" y="528" text-anchor="middle">WebdriverIO</text>
    <rect x="734" y="496" width="150" height="50" rx="25" fill="#ffffff" opacity="0.06"/>
    <text x="809" y="528" text-anchor="middle">JUnit</text>
    <rect x="900" y="496" width="150" height="50" rx="25" fill="#ffffff" opacity="0.06"/>
    <text x="975" y="528" text-anchor="middle">Jest</text>
  </g>

  <!-- Footer URL -->
  <text x="96" y="600" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#64748b">github.com/Absence0760/project-flakey</text>
</svg>
