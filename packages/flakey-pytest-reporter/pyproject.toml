[project]
name = "flakey-pytest-reporter"
version = "0.1.0"
description = "Pytest reporter for Flakey — uploads test results to a Flakey backend"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
dependencies = ["pytest>=6.0"]

[project.entry-points.pytest11]
flakey = "flakey_pytest_reporter.plugin"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/flakey_pytest_reporter"]

[dependency-groups]
dev = ["pytest>=6.0"]
