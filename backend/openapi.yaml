openapi: 3.1.0
info:
  title: Flakey API
  version: 0.1.0
  description: |
    HTTP API for the Flakey test-reporting dashboard.

    **This is the source of truth for the API contract.** `frontend/src/lib/api-generated.ts`
    is generated from it via `pnpm openapi:generate` (openapi-typescript). When you
    add or change a route, update this spec **in the same commit** — the
    `pnpm openapi:check` drift check (and CI) flags a stale spec.

    Scope: this is a **seed** covering the core, integrator-facing surface (runs,
    tests, errors, stats, flaky, compare, auth, health) plus the two AI write
    routes that open repo PRs / cluster failures (`/analyze/clusters`,
    `/analyze/fix-pr`). Remaining routes (other `/analyze/*`, integrations,
    releases, manual tests, live SSE, uploads, quarantine, views, coverage,
    support) are TODO — add them here as the contract is migrated off the
    hand-synced `frontend/src/lib/api.ts`. Run `pnpm endpoint-inventory` (the
    skill) for the full route list to work through.

    Auth: every endpoint except `/health`, `/auth/login`, and `/auth/register`
    requires a Bearer token — a JWT from login, or a `fk_…` API key. All
    tenant-scoped responses are filtered to the caller's org by Postgres RLS
    (not expressible in OpenAPI; see docs/architecture.md §4).
servers:
  - url: "{baseUrl}"
    description: Backend API origin (FLAKEY_API_URL / VITE_API_URL)
    variables:
      baseUrl:
        default: http://localhost:3000

tags:
  - name: auth
  - name: runs
  - name: tests
  - name: errors
  - name: analytics
  - name: ai
    description: |
      AI-assisted analysis. All AI runs against the instance-configured provider
      (`AI_PROVIDER` / `AI_BASE_URL`) — point it at a local Ollama for a fully
      air-gapped, no-egress deployment. AI is instance-wide, not per-org; when no
      provider is configured these routes 503 on generation but still serve any
      cached result. Generation is contributor+ (viewers 403).

security:
  - bearerAuth: []

paths:
  /health:
    get:
      tags: [analytics]
      summary: Liveness probe
      security: []
      responses:
        "200":
          description: Service is up
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }

  /auth/login:
    post:
      tags: [auth]
      summary: Exchange email + password for tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/register:
    post:
      tags: [auth]
      summary: Register a new user + personal org (when registration is enabled)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
                name: { type: string }
      responses:
        "200":
          description: Registered
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /runs:
    get:
      tags: [runs]
      summary: List recent runs (org-scoped)
      parameters:
        - { name: suite, in: query, schema: { type: string } }
        - { name: branch, in: query, schema: { type: string } }
        - { name: environment, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, default: 50 } }
      responses:
        "200":
          description: Run list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Run" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [runs]
      summary: Ingest a test run
      description: |
        Accepts either a pre-normalized run (`{meta, stats, specs}`, as the
        first-class reporters send) or `{raw, meta}` for a vendor format the
        backend normalizes. `multipart/form-data` to `/runs/upload` is used when
        shipping artifacts; this JSON path is for results only.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NormalizedRunInput" }
      responses:
        "200":
          description: Run created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /runs/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer } }
    get:
      tags: [runs]
      summary: Get one run with its specs + tests
      responses:
        "200":
          description: Run detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunDetail" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [runs]
      summary: Delete a run (cascades to specs/tests/artifacts)
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/NotFound" }

  /tests/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer } }
    get:
      tags: [tests]
      summary: Get one test with artifacts + navigation
      responses:
        "200":
          description: Test detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TestDetail" }
        "404": { $ref: "#/components/responses/NotFound" }

  /tests/{id}/history:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer } }
    get:
      tags: [tests]
      summary: Pass/fail timeline for a test across runs
      responses:
        "200":
          description: History
          content:
            application/json:
              schema:
                type: object
                properties:
                  title: { type: string }
                  full_title: { type: string }
                  file_path: { type: string }
                  history:
                    type: array
                    items:
                      type: object
                      properties:
                        test_id: { type: integer }
                        status: { $ref: "#/components/schemas/TestStatus" }
                        duration_ms: { type: integer }
                        error_message: { type: [string, "null"] }
                        run_id: { type: integer }
                        suite_name: { type: string }
                        branch: { type: string }
                        created_at: { type: string, format: date-time }

  /errors:
    get:
      tags: [errors]
      summary: Recurring failures grouped by error fingerprint
      description: |
        Returns the 100 most-recent error groups (by last_seen, then
        occurrence_count). The `status` filter is applied **before** that cap,
        so a status rarer than the 100 newest groups is not truncated. An
        unrecognised `status` value is ignored (no filter applied).
      parameters:
        - { name: suite, in: query, schema: { type: string } }
        - name: status
          in: query
          schema: { $ref: "#/components/schemas/ErrorStatus" }
      responses:
        "200":
          description: Error groups
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ErrorGroup" }

  /errors/{fingerprint}/status:
    parameters:
      - { name: fingerprint, in: path, required: true, schema: { type: string } }
    patch:
      tags: [errors]
      summary: Set the triage status of an error group (upsert)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { $ref: "#/components/schemas/ErrorStatus" }
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated: { type: boolean }
                  group_id: { type: integer }
                  status: { $ref: "#/components/schemas/ErrorStatus" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /errors/{fingerprint}/assign:
    parameters:
      - { name: fingerprint, in: path, required: true, schema: { type: string } }
    post:
      tags: [errors]
      summary: Assign (or un-assign) an owner to an error group (upsert)
      description: |
        Lightweight triage ownership — "who's chasing this failure". Pass
        `user_id: null` to un-assign. The user must be a member of the caller's
        org. Viewer role is rejected (403).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id: { type: [integer, "null"] }
      responses:
        "200":
          description: Assignment updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  assigned: { type: boolean }
                  group_id: { type: integer }
                  user_id: { type: [integer, "null"] }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403":
          description: Viewer role — assigning an error is admin+
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /errors/{fingerprint}/tests:
    parameters:
      - { name: fingerprint, in: path, required: true, schema: { type: string } }
    get:
      tags: [errors]
      summary: Tests affected by an error group
      responses:
        "200":
          description: Affected tests
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AffectedTest" }

  /errors/{fingerprint}/notes:
    parameters:
      - { name: fingerprint, in: path, required: true, schema: { type: string } }
    get:
      tags: [errors]
      summary: Notes on an error group
      responses:
        "200":
          description: Notes (oldest first)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ErrorNote" }
    post:
      tags: [errors]
      summary: Add a note to an error group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string }
      responses:
        "201":
          description: Note created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorNote" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /flaky:
    get:
      tags: [analytics]
      summary: Tests that alternate pass/fail
      parameters:
        - { name: suite, in: query, schema: { type: string } }
        - { name: runs, in: query, schema: { type: integer, default: 30 } }
      responses:
        "200":
          description: Flaky tests
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/FlakyTest" }

  /stats:
    get:
      tags: [analytics]
      summary: Dashboard statistics
      parameters:
        - { name: from, in: query, schema: { type: string, format: date } }
        - { name: to, in: query, schema: { type: string, format: date } }
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardStats" }

  /compare:
    get:
      tags: [analytics]
      summary: Compare two runs (newly-failed / fixed / flipped)
      parameters:
        - { name: a, in: query, required: true, schema: { type: integer } }
        - { name: b, in: query, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Comparison
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary: { type: object, additionalProperties: true }
                  comparisons:
                    type: array
                    items: { type: object, additionalProperties: true }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

  /analyze/clusters:
    post:
      tags: [ai]
      summary: Group the org's distinct failed errors into root-cause clusters
      description: |
        Deterministic similarity clustering over the org's distinct failed-test
        error messages (cost-free, works with AI off). When an AI provider is
        configured, each multi-member cluster also gets a short cached "theme"
        label + summary; singletons and viewer/AI-off callers get `theme: null`.
        Cached themes are returned to everyone; theme generation is contributor+.
      responses:
        "200":
          description: Clusters (most-recent first), capped at the 200 newest distinct errors
          content:
            application/json:
              schema:
                type: object
                properties:
                  clusters:
                    type: array
                    items: { $ref: "#/components/schemas/ErrorCluster" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /analyze/fix-pr:
    post:
      tags: [ai]
      summary: Open a DRAFT PR with an AI-proposed fix for a failing test
      description: |
        Resolves the target failing test (by `testId` or `fingerprint` —
        exactly one), asks the configured AI provider to rewrite the offending
        file, and opens a **draft** pull/merge request on the org's configured
        git provider with the proposed change. Always a draft — never
        auto-merged; a human reviews and merges.

        Safety guards: the target file must be ≤ 40 000 chars (else 413); empty
        or unchanged model output opens no PR (`created: false`); output under
        half the original size is treated as a truncation and rejected (422).
        Idempotent per `(org, target)` — a second call while a fix PR is still
        open returns the existing one (`created: false, reason: "exists"`).

        **Requires a git provider configured with WRITE / PR scope.** This is an
        elevated, opt-in scope beyond the read-only PR-comment / Checks token —
        see backend/docs/integrations.md. Contributor+ only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Provide exactly one of testId or fingerprint.
              properties:
                testId: { type: integer, description: A failed test row id }
                fingerprint: { type: string, description: An error-group fingerprint }
      responses:
        "200":
          description: |
            Fix-PR outcome. `created: true` with the PR ref on success; `created:
            false` (with a `reason`) when an open PR already exists or the model
            produced no change.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FixPrResult" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Viewer role — generating a fix PR is contributor+
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: No matching failed test with an error message
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: No git provider configured for the org
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "413":
          description: Target file too large for an automated fix
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422":
          description: Target file not found in the repo, or the generated patch looked truncated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "502":
          description: Git provider / model call failed mid-flow
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "503":
          description: No AI provider configured
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: A login JWT or an `fk_…` API key.

  responses:
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Resource not found (or not visible to this org)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    Error:
      type: object
      properties:
        error: { type: string }

    TestStatus:
      type: string
      enum: [passed, failed, skipped, pending]

    AuthResponse:
      type: object
      properties:
        token: { type: string }
        refreshToken: { type: string }
        user:
          type: object
          properties:
            id: { type: integer }
            email: { type: string, format: email }
            name: { type: [string, "null"] }

    Run:
      type: object
      required: [id, suite_name, total, passed, failed, skipped, pending, duration_ms]
      properties:
        id: { type: integer }
        suite_name: { type: string }
        branch: { type: string }
        commit_sha: { type: string }
        ci_run_id: { type: string }
        reporter: { type: string }
        started_at: { type: string, format: date-time }
        finished_at:
          type: [string, "null"]
          format: date-time
          description: null until the run merges/completes (live runs start with no finish time)
        total: { type: integer }
        passed: { type: integer }
        failed: { type: integer }
        skipped: { type: integer }
        pending: { type: integer }
        duration_ms: { type: integer }
        created_at: { type: string, format: date-time }
        spec_count: { type: integer }
        spec_files: { type: [array, "null"], items: { type: string } }
        new_failures: { type: integer }
        aborted: { type: boolean }
        environment:
          type: string
          description: "'' when no environment label is set (NOT NULL DEFAULT '')"

    RunDetail:
      allOf:
        - $ref: "#/components/schemas/Run"
        - type: object
          properties:
            specs:
              type: array
              items: { $ref: "#/components/schemas/Spec" }
            prev_id: { type: [integer, "null"] }
            next_id: { type: [integer, "null"] }

    Spec:
      type: object
      properties:
        id: { type: integer }
        run_id: { type: integer }
        file_path: { type: string }
        title: { type: string }
        total: { type: integer }
        passed: { type: integer }
        failed: { type: integer }
        skipped: { type: integer }
        pending: { type: integer }
        duration_ms: { type: integer }
        tests:
          type: array
          items: { $ref: "#/components/schemas/TestResult" }

    TestResult:
      type: object
      required: [id, title, full_title, status, duration_ms]
      properties:
        id: { type: integer }
        spec_id: { type: integer }
        title: { type: string }
        full_title: { type: string }
        status: { $ref: "#/components/schemas/TestStatus" }
        duration_ms: { type: integer }
        error_message: { type: [string, "null"] }
        error_stack: { type: [string, "null"] }
        screenshot_paths: { type: array, items: { type: string } }
        video_path: { type: [string, "null"] }
        test_code: { type: [string, "null"] }
        command_log:
          type: [array, "null"]
          items:
            type: object
            properties:
              name: { type: string }
              message: { type: string }
              state: { type: string }
        snapshot_path: { type: [string, "null"] }
        failure_context:
          oneOf:
            - { $ref: "#/components/schemas/FailureContext" }
            - { type: "null" }

    FailureContext:
      type: object
      description: Cypress failure-context capture (Phase 13).
      properties:
        commands_tail:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              message: { type: string }
              state: { type: string }
        browser_console: { type: array, items: { type: string } }
        uncaught_errors: { type: array, items: { type: string } }
        network_failures: { type: array, items: { type: string } }
        retry_errors:
          type: array
          items:
            type: object
            properties:
              attempt: { type: integer }
              message: { type: string }
              stack: { type: string }
        resolved_stack:
          type: array
          items:
            type: object
            properties:
              file: { type: string }
              line: { type: integer }
              column: { type: integer }
              function: { type: string }
        code_frame:
          type: object
          properties:
            file: { type: string }
            line: { type: integer }
            column: { type: integer }
            frame: { type: string }

    TestDetail:
      allOf:
        - $ref: "#/components/schemas/TestResult"
        - type: object
          properties:
            file_path: { type: string }
            run_id: { type: integer }
            spec_title: { type: string }
            prev_failed_id: { type: [integer, "null"] }
            next_failed_id: { type: [integer, "null"] }
            failed_index: { type: integer }
            failed_total: { type: integer }

    ErrorStatus:
      type: string
      description: Triage state of an error group. Unstamped groups default to `open`.
      enum: [open, investigating, known, fixed, ignored]

    ErrorGroup:
      type: object
      properties:
        fingerprint: { type: string }
        error_message: { type: string }
        occurrence_count: { type: integer }
        affected_tests: { type: integer }
        affected_runs: { type: integer }
        first_seen: { type: string, format: date-time }
        last_seen: { type: string, format: date-time }
        latest_run_id: { type: integer }
        latest_test_id: { type: [integer, "null"] }
        test_titles: { type: array, items: { type: string } }
        file_paths: { type: array, items: { type: string } }
        suite_name: { type: string }
        group_id: { type: [integer, "null"] }
        status: { $ref: "#/components/schemas/ErrorStatus" }
        assigned_to: { type: [integer, "null"] }
        assigned_to_email: { type: [string, "null"] }
        target_date: { type: [string, "null"], description: "YYYY-MM-DD due date (Phase 15.1), or null." }
        priority:
          type: [string, "null"]
          enum: [low, medium, high, critical, null]
          description: "Triage priority (Phase 15.1/15.2). Always populated on the response — a human value or a read-time derived default; see priority_source."
        priority_source:
          type: string
          enum: [manual, derived]
          description: "Whether `priority` is a human decision ('manual') or a read-time derived default ('derived', never stored)."
        recurrence_count: { type: integer, description: "How many times a `fixed` group came back (Phase 15.2 ingest recurrence hook)." }
        last_recurred_at: { type: [string, "null"], format: date-time }
        quarantine_suggested:
          type: boolean
          description: "Read-side SUGGESTION (never an action): a member test is flaky above the threshold and not already quarantined, so the triage view offers a 'Quarantine?' hint a human confirms (Phase 15.3). The server never auto-mutes."
        note_count: { type: integer }

    AffectedTest:
      type: object
      properties:
        full_title: { type: string }
        title: { type: string }
        file_path: { type: string }
        suite_name: { type: string }
        occurrence_count: { type: integer }
        last_seen: { type: string, format: date-time }
        latest_test_id: { type: integer }
        latest_run_id: { type: integer }

    ErrorNote:
      type: object
      properties:
        id: { type: integer }
        body: { type: string }
        created_at: { type: string, format: date-time }
        user_name: { type: [string, "null"] }
        user_email: { type: [string, "null"] }

    FlakyTest:
      type: object
      properties:
        full_title: { type: string }
        file_path: { type: string }
        suite_name: { type: string }
        flaky_rate: { type: number }
        flip_count: { type: integer }
        total_runs: { type: integer }

    DashboardStats:
      type: object
      properties:
        automated:
          type: object
          properties:
            total_runs: { type: integer }
            total_tests: { type: integer }
            total_passed: { type: integer }
            total_failed: { type: integer }
            pass_rate: { type: number }
            recent_runs:
              type: array
              items: { $ref: "#/components/schemas/Run" }
        manual:
          type: object
          additionalProperties: true

    NormalizedRunInput:
      type: object
      description: A pre-normalized run as the first-class reporters POST it.
      required: [meta, stats, specs]
      properties:
        meta:
          type: object
          required: [suite_name, branch, commit_sha, ci_run_id, started_at, finished_at, reporter]
          properties:
            suite_name: { type: string }
            branch: { type: string }
            commit_sha: { type: string }
            ci_run_id: { type: string }
            started_at: { type: string }
            finished_at: { type: string }
            reporter: { type: string }
            release: { type: string }
            environment: { type: string }
        stats: { $ref: "#/components/schemas/RunStats" }
        specs:
          type: array
          items:
            type: object
            required: [file_path, title, stats, tests]
            properties:
              file_path: { type: string }
              title: { type: string }
              stats: { $ref: "#/components/schemas/RunStats" }
              tests:
                type: array
                items:
                  type: object
                  required: [title, full_title, status, duration_ms]
                  properties:
                    title: { type: string }
                    full_title: { type: string }
                    status: { $ref: "#/components/schemas/TestStatus" }
                    duration_ms: { type: integer }
                    error:
                      type: object
                      properties:
                        message: { type: string }
                        stack: { type: string }
                    screenshot_paths: { type: array, items: { type: string } }
                    video_path: { type: string }
                    test_code: { type: string }
                    command_log: { type: array, items: { type: object, additionalProperties: true } }
                    metadata: { type: object, additionalProperties: true }
                    failure_context: { $ref: "#/components/schemas/FailureContext" }

    RunStats:
      type: object
      required: [total, passed, failed, skipped, pending, duration_ms]
      properties:
        total: { type: integer }
        passed: { type: integer }
        failed: { type: integer }
        skipped: { type: integer }
        pending: { type: integer }
        duration_ms: { type: integer }

    ErrorCluster:
      type: object
      description: A root-cause cluster of similar failed-test errors.
      properties:
        target_key: { type: string, description: Stable key for the cluster (caches the theme) }
        theme:
          type: [string, "null"]
          description: AI-generated short label; null when AI is off, the caller is a viewer, or the cluster is a singleton
        summary: { type: [string, "null"], description: AI-generated cluster summary (null in the same cases as theme) }
        member_count: { type: integer }
        total_occurrences: { type: integer, description: Sum of occurrence_count across all members }
        representative_fingerprint: { type: string }
        members:
          type: array
          description: Up to 20 member errors (error messages truncated)
          items:
            type: object
            properties:
              fingerprint: { type: string }
              error_message: { type: string }
              suite_name: { type: string }
              occurrence_count: { type: integer }
              status: { $ref: "#/components/schemas/ErrorStatus" }

    FixPrResult:
      type: object
      description: |
        Outcome of POST /analyze/fix-pr. On success `created` is true and the PR
        ref fields are present; otherwise `created` is false with a `reason`
        (`"exists"` = an open fix PR already exists; `"no change"` = the model
        produced no edit).
      required: [created]
      properties:
        created: { type: boolean }
        reason:
          type: string
          enum: [exists, "no change"]
          description: Present only when created is false
        pr_url: { type: string }
        pr_number: { type: integer }
        branch: { type: string }
