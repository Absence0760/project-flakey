{{- include "flakey.validateValues" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "flakey.fullname" . }}
  labels:
    {{- include "flakey.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  {{- if eq .Values.storage.type "local" }}
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "flakey.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "flakey.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "flakey.serviceAccountName" . }}
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "flakey.fullname" . }}
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "flakey.secretName" . }}
                  key: jwt-secret
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "flakey.dbSecretName" . }}
                  key: password
            - name: DB_MIGRATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "flakey.dbSecretName" . }}
                  key: migration-password
            {{- if and .Values.smtp.enabled .Values.smtp.password }}
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "flakey.fullname" . }}-smtp
                  key: smtp-password
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if eq .Values.storage.type "local" }}
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          {{- end }}
      {{- if eq .Values.storage.type "local" }}
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: {{ include "flakey.fullname" . }}-uploads
      {{- end }}
