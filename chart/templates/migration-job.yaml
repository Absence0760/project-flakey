apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "flakey.fullname" . }}-migrate-{{ .Release.Revision }}
  labels:
    {{- include "flakey.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "flakey.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["sh", "-c"]
          args:
            - |
              export PGHOST="{{ include "flakey.dbHost" . }}"
              export PGPORT="{{ .Values.database.port }}"
              export PGDATABASE="{{ .Values.database.name }}"
              export PGUSER="$DB_MIGRATION_USER"
              export PGPASSWORD="$DB_MIGRATION_PASSWORD"

              echo "[migrate] Waiting for database..."
              until pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -q; do
                sleep 2
              done

              echo "[migrate] Running migrations..."
              for f in /app/migrations/*.sql; do
                echo "  Applying $(basename $f)..."
                psql -v ON_ERROR_STOP=1 -q -f "$f"
              done
              echo "[migrate] Done."
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          env:
            - name: DB_MIGRATION_USER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "flakey.fullname" . }}
                  key: DB_MIGRATION_USER
            - name: DB_MIGRATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "flakey.dbSecretName" . }}
                  key: migration-password
