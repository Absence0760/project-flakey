apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "flakey.fullname" . }}
  labels:
    {{- include "flakey.labels" . | nindent 4 }}
data:
  PORT: "3000"
  NODE_ENV: "production"
  DB_HOST: {{ include "flakey.dbHost" . | quote }}
  DB_PORT: {{ .Values.database.port | quote }}
  DB_NAME: {{ .Values.database.name | quote }}
  DB_USER: {{ .Values.database.user | quote }}
  DB_MIGRATION_USER: {{ .Values.database.migrationUser | quote }}
  CORS_ORIGINS: {{ .Values.app.frontendUrl | quote }}
  FRONTEND_URL: {{ .Values.app.frontendUrl | quote }}
  ALLOW_REGISTRATION: {{ .Values.app.allowRegistration | quote }}
  REQUIRE_EMAIL_VERIFICATION: {{ .Values.app.requireEmailVerification | quote }}
  STORAGE: {{ .Values.storage.type | quote }}
  {{- if eq .Values.storage.type "s3" }}
  S3_BUCKET: {{ .Values.storage.s3.bucket | quote }}
  S3_REGION: {{ .Values.storage.s3.region | quote }}
  {{- if .Values.storage.s3.prefix }}
  S3_PREFIX: {{ .Values.storage.s3.prefix | quote }}
  {{- end }}
  {{- if .Values.storage.s3.cdnUrl }}
  CDN_URL: {{ .Values.storage.s3.cdnUrl | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.smtp.enabled }}
  SMTP_HOST: {{ .Values.smtp.host | quote }}
  SMTP_PORT: {{ .Values.smtp.port | quote }}
  SMTP_SECURE: {{ .Values.smtp.secure | quote }}
  {{- if .Values.smtp.user }}
  SMTP_USER: {{ .Values.smtp.user | quote }}
  {{- end }}
  EMAIL_FROM: {{ .Values.smtp.from | quote }}
  {{- end }}
